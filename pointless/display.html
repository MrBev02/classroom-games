<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINTLESS — Display</title>
    <link rel="stylesheet" href="css/display.css">
</head>
<body>
    <div id="game-display">
        <header id="header">
            <div class="round-info" id="roundInfo"></div>
            <h1 class="game-title">POINTLESS</h1>
        </header>

        <main id="mainArea">
            <!-- Waiting -->
            <div class="view active" id="viewWaiting">
                <div class="waiting-content">
                    <h1 class="title-large">POINTLESS</h1>
                    <p>Waiting for game to begin&hellip;</p>
                    <div class="pulse-dot"></div>
                </div>
            </div>

            <!-- Question + Score Bar -->
            <div class="view" id="viewQuestion">
                <div class="question-section">
                    <div class="category" id="categoryText"></div>
                    <div class="question" id="questionText"></div>
                </div>
                <div class="score-section">
                    <div class="score-bar-container" id="scoreBarContainer">
                        <div class="score-bar-scale">
                            <span>100</span><span>75</span><span>50</span><span>25</span><span>0</span>
                        </div>
                        <div class="score-bar-track" id="scoreBarTrack">
                            <div class="score-bar-fill" id="scoreBarFill"></div>
                        </div>
                        <div class="score-bar-counter" id="scoreBarCounter">
                            <span id="counterValue">&mdash;</span>
                        </div>
                    </div>
                    <div class="score-answer" id="scoreAnswer"></div>
                </div>
                <div class="pointless-label" id="pointlessLabel">POINTLESS!</div>
            </div>

            <!-- Scoreboard -->
            <div class="view" id="viewScoreboard">
                <h2 class="scoreboard-title">SCOREBOARD</h2>
                <div class="scoreboard-teams" id="scoreboardTeams"></div>
            </div>

            <!-- Final Round -->
            <div class="view" id="viewFinal">
                <h2 class="final-title">THE FINAL</h2>
                <div class="final-category" id="finalCategory"></div>
                <div class="final-question" id="finalQuestion"></div>
                <div class="final-answers" id="finalAnswers"></div>
                <div class="final-total" id="finalTotal"></div>
            </div>

            <!-- Winner -->
            <div class="view" id="viewWinner">
                <div class="winner-content">
                    <h2>WINNER</h2>
                    <div class="winner-name" id="winnerName"></div>
                    <div class="winner-trophy">&#9733;</div>
                </div>
            </div>
        </main>

        <footer id="teamsBar">
            <div class="team-panel" data-team="0">
                <div class="team-name" id="teamName0">Team 1</div>
                <div class="team-score" id="teamScore0">0</div>
                <div class="team-round-score" id="teamRound0"></div>
            </div>
            <div class="team-panel" data-team="1">
                <div class="team-name" id="teamName1">Team 2</div>
                <div class="team-score" id="teamScore1">0</div>
                <div class="team-round-score" id="teamRound1"></div>
            </div>
            <div class="team-panel" data-team="2">
                <div class="team-name" id="teamName2">Team 3</div>
                <div class="team-score" id="teamScore2">0</div>
                <div class="team-round-score" id="teamRound2"></div>
            </div>
            <div class="team-panel" data-team="3">
                <div class="team-name" id="teamName3">Team 4</div>
                <div class="team-score" id="teamScore3">0</div>
                <div class="team-round-score" id="teamRound3"></div>
            </div>
        </footer>
    </div>

    <div id="celebrationOverlay" class="celebration-overlay"></div>

    <script src="js/channel.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/display.js"></script>
</body>
</html>
